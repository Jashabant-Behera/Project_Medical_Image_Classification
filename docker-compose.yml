version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chest_xray_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U appuser']
      interval: 10s
      timeout: 5s
      retries: 5
 
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://appuser:password@postgres:5432/chest_xray_db
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8000:8000'
 
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: ''  # Empty = relative URLs, nginx proxies to backend
    depends_on:
      - backend
 
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
 
volumes:
  postgres_data:
